<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <meta name="application-name" content="NoteApp">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="NoteApp">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>NoteApp</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a class="skip-link" href="#noteList">ノート一覧へ移動</a>

    <div class="app-shell">
      <section class="list-page" id="listView" aria-labelledby="listTitle">
        <header class="list-header">
          <h1 id="listTitle">NoteApp</h1>
          <div class="list-actions">
            <button class="icon-button" id="installAppButton" type="button" title="アプリをインストール" aria-label="アプリをインストール">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12"></path>
                <path d="m7 10 5 5 5-5"></path>
                <path d="M5 21h14"></path>
              </svg>
            </button>
            <button class="icon-button primary" id="newNoteButton" type="button" title="新規ノート" aria-label="新規ノート">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14"></path>
              </svg>
            </button>
          </div>
        </header>

        <label class="search-field">
          <span class="visually-hidden">ノート検索</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="検索" autocomplete="off">
        </label>

        <div class="note-list" id="noteList" role="list"></div>
      </section>

      <main class="editor-page" id="editorView" hidden>
        <header class="editor-header">
          <button class="icon-button" id="backToListButton" type="button" title="一覧へ戻る" aria-label="一覧へ戻る">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 12H5"></path>
              <path d="m12 19-7-7 7-7"></path>
            </svg>
          </button>

          <label class="visually-hidden" for="titleInput">ノートタイトル</label>
          <input id="titleInput" class="title-input" type="text" placeholder="無題" autocomplete="off">

          <div class="document-actions">
            <div class="save-state" id="saveState" role="status" aria-live="polite">
              <span class="save-state-icon" id="saveStateIcon" aria-hidden="true"></span>
              <span class="visually-hidden">最終更新</span>
              <span id="saveStateTime">--</span>
            </div>
            <div class="page-state" id="pageState" aria-live="polite">1 / 1</div>
          </div>
        </header>

        <div class="editor-toolbar" role="toolbar" aria-label="描画ツール">
          <div class="tool-cluster open" id="penToolCluster">
            <button class="icon-button tool-button active" id="penButton" type="button" title="ペン" aria-label="ペン" aria-pressed="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m18 2 4 4-12 12-5 1 1-5L18 2Z"></path>
                <path d="m14 6 4 4"></path>
              </svg>
            </button>
            <div class="color-swatches tool-options" id="colorSwatches" role="group" aria-label="ペンの色">
              <button class="swatch active" type="button" data-color="#202124" style="--swatch: #202124" title="黒" aria-label="黒" aria-pressed="true"></button>
              <button class="swatch" type="button" data-color="#1f6feb" style="--swatch: #1f6feb" title="青" aria-label="青" aria-pressed="false"></button>
              <button class="swatch" type="button" data-color="#d23f31" style="--swatch: #d23f31" title="赤" aria-label="赤" aria-pressed="false"></button>
            </div>
          </div>
          <div class="tool-cluster eraser-tool-cluster normal-selected" id="eraserToolCluster">
            <button class="icon-button tool-button" id="eraserButton" type="button" title="消しゴム" aria-label="消しゴム" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m7 21-5-5L14 4a3 3 0 0 1 4 0l2 2a3 3 0 0 1 0 4L9 21H7Z"></path>
                <path d="m12 8 6 6"></path>
                <path d="M3 21h18"></path>
              </svg>
            </button>
            <button class="icon-button tool-button eraser-mode-button" id="eraserModeButton" type="button" title="通常の消しゴム" aria-label="通常の消しゴム" aria-pressed="false" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m7 21-5-5L14 4a3 3 0 0 1 4 0l2 2a3 3 0 0 1 0 4L9 21H7Z"></path>
                <path d="m12 8 6 6"></path>
                <path d="M3 21h18"></path>
              </svg>
            </button>
          </div>
          <button class="icon-button tool-button" id="pencilModeButton" type="button" title="Pencilモード" aria-label="Pencilモード" aria-pressed="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m18 2 4 4-13 13-4 1 1-4L18 2Z"></path>
              <path d="m13 7 4 4"></path>
              <path d="M3 22h18"></path>
              <path d="M3 12c1.2-1.3 2.7-1.3 4 0"></path>
            </svg>
          </button>

          <button class="icon-button danger" id="deletePageButton" type="button" title="選択ページ削除" aria-label="選択ページ削除">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="m6 6 1 15h10l1-15"></path>
            </svg>
          </button>

          <div class="zoom-controls" role="group" aria-label="表示倍率">
            <button class="icon-button" id="zoomOutButton" type="button" title="縮小" aria-label="縮小">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.3-4.3"></path>
                <circle cx="10.8" cy="10.8" r="7.2"></circle>
                <path d="M7.8 10.8h6"></path>
              </svg>
            </button>
            <button class="icon-button zoom-reset" id="zoomResetButton" type="button" title="100%に戻す" aria-label="100%に戻す">
              <span id="zoomValue" aria-live="polite">100%</span>
            </button>
            <button class="icon-button" id="zoomInButton" type="button" title="拡大" aria-label="拡大">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.3-4.3"></path>
                <circle cx="10.8" cy="10.8" r="7.2"></circle>
                <path d="M7.8 10.8h6"></path>
                <path d="M10.8 7.8v6"></path>
              </svg>
            </button>
          </div>

          <button class="icon-button" id="undoButton" type="button" title="元に戻す" aria-label="元に戻す">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 14 4 9l5-5"></path>
              <path d="M4 9h11a5 5 0 0 1 0 10h-1"></path>
            </svg>
          </button>
          <button class="icon-button" id="redoButton" type="button" title="やり直す" aria-label="やり直す">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 14 5-5-5-5"></path>
              <path d="M20 9H9a5 5 0 0 0 0 10h1"></path>
            </svg>
          </button>
          <button class="icon-button" id="exportPdfButton" type="button" title="PDFを書き出し" aria-label="PDFを書き出し">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path>
              <path d="M14 2v6h6"></path>
              <path d="M12 18v-6"></path>
              <path d="m9 15 3 3 3-3"></path>
            </svg>
          </button>
          <button class="icon-button" id="clearCanvasButton" type="button" title="ページを消去" aria-label="ページを消去">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="m6 6 1 15h10l1-15"></path>
            </svg>
          </button>
        </div>

        <section class="editor-surface" aria-label="ノート編集">
          <div class="canvas-shell">
            <div id="pageStack" class="page-stack" tabindex="-1" aria-label="手書きページ"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
